# UBIS on-prem nginx config.
# Serves the React PWA and reverse-proxies /api/* (including upload endpoints) to the backend container.

upstream ubis_backend {
    server backend:8000;
    keepalive 16;
}

server {
    listen       80;
    server_name  _;

    # Allow large submissions (multi-photo case uploads, bulk import previews).
    client_max_body_size 100m;

    # Gzip for HTML / JS / CSS — images are already compressed.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 1024;

    # Security headers (bare minimum; tighten further per police IT policy).
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy API and WebSocket traffic to the FastAPI backend.
    location /api/ {
        proxy_pass         http://ubis_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Long timeouts for image upload / bulk operations.
        proxy_connect_timeout 30s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    # OpenAPI Swagger UI also lives on /docs and /openapi.json on the backend.
    location /docs        { proxy_pass http://ubis_backend; }
    location /redoc       { proxy_pass http://ubis_backend; }
    location /openapi.json { proxy_pass http://ubis_backend; }

    # Lightweight in-cluster health probe.
    location = /healthz {
        default_type text/plain;
        return 200 'ok';
    }

    # Single-page app: anything else falls back to index.html.
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
