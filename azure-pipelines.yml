# Azure DevOps Pipeline for UBIS Backend

# Trigger on pushes to the main branch
trigger:
- main

# Use a variable group from Azure DevOps to store secrets
# Create a variable group named 'ubis-prod-secrets' with:
# - ACR_USERNAME
# - ACR_PASSWORD
# - DATABASE_URL
# - JWT_SECRET
# - AZURE_STORAGE_CONNECTION_STRING
# - QDRANT_URL
# - QDRANT_API_KEY
variables:
- group: ubis-prod-secrets
- name: RESOURCE_GROUP
  value: 'HaryanaPolice'
- name: LOCATION
  value: 'centralindia'
- name: ACR_NAME
  value: 'haryanaacr' # Make sure this is the same as your ACR name
- name: APP_SERVICE_PLAN
  value: 'haryana-app-plan'
- name: WEBAPP_NAME
  value: 'haryana-facial-recog' # Make sure this is the same as your Web App name
- name: IMAGE_NAME
  value: 'ubis-backend'
- name: DOCKERFILE_PATH
  value: 'backend/Dockerfile.production'
- name: POOL_IMAGE
  value: 'ubuntu-latest'

stages:
- stage: Build
  displayName: 'Build and Push Docker Image'
  jobs:
  - job: Build
    displayName: 'Build Job'
    pool:
      vmImage: $(POOL_IMAGE)
    steps:
    - task: Docker@2
      displayName: 'Build Docker Image'
      inputs:
        containerRegistry: 'ACRServiceConnection' # Name of your ACR service connection in Azure DevOps
        repository: '$(IMAGE_NAME)'
        command: 'build'
        dockerfile: '$(DOCKERFILE_PATH)'
        tags: '$(Build.BuildId)'
        arguments: '--build-arg BUILDKIT_INLINE_CACHE=1'

    - task: Docker@2
      displayName: 'Push Docker Image to ACR'
      inputs:
        containerRegistry: 'ACRServiceConnection'
        repository: '$(IMAGE_NAME)'
        command: 'push'
        tags: '$(Build.BuildId)'

- stage: Deploy
  displayName: 'Deploy to Azure App Service'
  dependsOn: Build
  jobs:
  - job: Deploy
    displayName: 'Deploy Job'
    pool:
      vmImage: $(POOL_IMAGE)
    steps:
    - task: AzureWebAppContainer@1
      displayName: 'Deploy to Azure App Service'
      inputs:
        azureSubscription: 'AzureSubscriptionServiceConnection' # Name of your Azure subscription service connection
        appName: '$(WEBAPP_NAME)'
        resourceGroupName: '$(RESOURCE_GROUP)'
        imageName: '$(ACR_NAME).azurecr.io/$(IMAGE_NAME):$(Build.BuildId)'
        
    - task: AzureAppServiceSettings@1
      displayName: 'Update App Service Settings'
      inputs:
        azureSubscription: 'AzureSubscriptionServiceConnection'
        appName: '$(WEBAPP_NAME)'
        resourceGroupName: '$(RESOURCE_GROUP)'
        appSettings: |
          [
            { "name": "WEBSITES_PORT", "value": "8000", "slotSetting": false },
            { "name": "ENVIRONMENT", "value": "production", "slotSetting": false },
            { "name": "LOG_LEVEL", "value": "WARNING", "slotSetting": false },
            { "name": "CORS_ORIGINS", "value": "https://your-frontend-url.com", "slotSetting": false },
            { "name": "DATABASE_URL", "value": "$(DATABASE_URL)", "slotSetting": false },
            { "name": "JWT_SECRET", "value": "$(JWT_SECRET)", "slotSetting": false },
            { "name": "AZURE_STORAGE_CONNECTION_STRING", "value": "$(AZURE_STORAGE_CONNECTION_STRING)", "slotSetting": false },
            { "name": "AZURE_STORAGE_CONTAINER_UPLOADS", "value": "uploads", "slotSetting": false },
            { "name": "AZURE_STORAGE_CONTAINER_REFERENCES", "value": "references", "slotSetting": false },
            { "name": "QDRANT_URL", "value": "$(QDRANT_URL)", "slotSetting": false },
            { "name": "QDRANT_API_KEY", "value": "$(QDRANT_API_KEY)", "slotSetting": false }
          ]
