# UBIS — On-prem single-server deployment for police IT teams.
#
#   • Profile "lite"  (default)  : backend (SQLite + embedded Qdrant) + frontend (nginx).
#                                  Recommended for the Gurugram pilot, ≤ ~5,000 cases.
#   • Profile "full"             : adds a PostgreSQL service for ~10k+ cases / heavier concurrency.
#
# Bring everything up with:
#       podman compose -f docker-compose.onprem.yml --profile lite up -d --build
#       docker compose -f docker-compose.onprem.yml --profile lite up -d --build
#
# On-prem guide: docs/HANDOVER_GURUGRAM/README.md
#
# Bring it down (data is preserved on the host under ./data):
#       podman compose -f docker-compose.onprem.yml down
#
# All persistent data lives on the host under ./data/{db,uploads,reference_photos,qdrant,models,logs}.
# That directory is what your nightly backup must capture (see docs/HANDOVER_GURUGRAM/02_OPERATIONS.md).

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.onprem
    image: ubis/backend:onprem
    container_name: ubis-backend
    profiles: ["lite", "full"]
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-onprem}
      PORT: "8000"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      # ── Database ──
      # Lite profile leaves DATABASE_URL empty so the app uses SQLite at /app/data/ubis.db.
      # Full profile sets DATABASE_URL to point at the postgres service below.
      DATABASE_URL: ${DATABASE_URL:-}
      SQLITE_PATH: /app/data/ubis.db

      # ── File storage (bind-mounted host dirs) ──
      SUBMISSIONS_STORAGE_PATH: /app/uploads
      REFERENCE_PHOTOS_PATH: /app/reference_photos

      # ── Vector DB (embedded Qdrant inside the backend process) ──
      QDRANT_URL: /app/qdrant_data
      QDRANT_COLLECTION: face_embeddings

      # ── Models (downloaded on first run if missing) ──
      ADAFACE_MODEL_PATH: /app/models/adaface_ir101.ckpt

      # ── Auth ──
      # JWT_SECRET MUST be set in .env (install.sh creates one with openssl rand -hex 32).
      # We don't use the strict :? syntax here because some compose implementations
      # (notably podman-compose 1.5) evaluate it even for inactive profiles.
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-1440}

      # ── CORS / public URL ──
      # Same-origin via nginx, so * is acceptable inside the docker network.
      CORS_ORIGINS: ${CORS_ORIGINS:-*}

      # ── Initial admin password (only used the very first time the DB is seeded) ──
      # install.sh generates a random one and writes it to .env.  After first login
      # the operator is expected to change it from the UI.
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-}
    volumes:
      - ./data/db:/app/data
      - ./data/uploads:/app/uploads
      - ./data/reference_photos:/app/reference_photos
      - ./data/qdrant:/app/qdrant_data
      - ./data/models:/app/models
      - ./data/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - ubis_internal
    # No depends_on for postgres here: podman-compose can mis-handle cross-profile
    # deps. For --profile full, start order is handled by restarting backend if needed.

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.onprem
    image: ubis/frontend:onprem
    container_name: ubis-frontend
    profiles: ["lite", "full"]
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${UBIS_HTTP_PORT:-8080}:80"
    networks:
      - ubis_internal

  # Optional Postgres for "full" profile.
  postgres:
    image: postgres:16-alpine
    container_name: ubis-postgres
    profiles: ["full"]
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-ubis}
      POSTGRES_USER:     ${POSTGRES_USER:-ubis}
      # install.sh writes POSTGRES_PASSWORD into .env when invoked with UBIS_PROFILE=full.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-ubis}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ubis_internal

networks:
  ubis_internal:
    driver: bridge

# Named volumes are intentionally NOT used — all data sits under ./data so a
# non-hands-on operator can `tar`, `cp`, or browse it without docker knowledge.
