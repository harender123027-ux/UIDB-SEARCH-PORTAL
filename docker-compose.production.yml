version: '3.8'

# ============================================================================
# PRODUCTION DOCKER COMPOSE
# ============================================================================
# Architecture:
#   - Azure Database for PostgreSQL: Relational data (users, attendance, etc.)
#   - Azure Blob Storage: Images (uploads, reference photos)
#   - Local Qdrant with Azure File Share: Vector embeddings (persistent, cost-efficient, no managed vector DB)
#
# Usage:
#   docker-compose -f docker-compose.production.yml --env-file .env.production up -d
# ============================================================================

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${ACR_NAME:-ubisacr}.azurecr.io/ubis-backend:${TAG:-latest}
    container_name: ubis-backend
    
    ports:
      - "${PORT:-8000}:8000"
    
    volumes:
      # Qdrant data - backed by Azure File Share for persistence
      # Mount path: /app/qdrant_storage
      - qdrant_data:/app/qdrant_storage
      # Logs - optional, for debugging
      - app_logs:/app/logs
    
    environment:
      # ‚îÄ‚îÄ‚îÄ General ‚îÄ‚îÄ‚îÄ
      - ENVIRONMENT=production
      - PORT=${PORT:-8000}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      
      # ‚îÄ‚îÄ‚îÄ Database: Azure PostgreSQL ‚îÄ‚îÄ‚îÄ
      # Format: postgresql://user:password@host:5432/dbname?sslmode=require
      - DATABASE_URL=${DATABASE_URL}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-ubis}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      
      # ‚îÄ‚îÄ‚îÄ Storage: Azure Blob Storage ‚îÄ‚îÄ‚îÄ
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING}
      - AZURE_STORAGE_CONTAINER_UPLOADS=${AZURE_STORAGE_CONTAINER_UPLOADS:-uploads}
      - AZURE_STORAGE_CONTAINER_REFERENCES=${AZURE_STORAGE_CONTAINER_REFERENCES:-references}
      
      # ‚îÄ‚îÄ‚îÄ Vector DB: Local Qdrant (persisted to Azure File Share) ‚îÄ‚îÄ‚îÄ
      # Qdrant is always local, no managed vector DB, no Cosmos DB, no AI Search, no PGVector.
      - QDRANT_URL=/app/qdrant_storage
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-face_embeddings}
      
      # ‚îÄ‚îÄ‚îÄ Authentication ‚îÄ‚îÄ‚îÄ
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE_MINUTES=${JWT_EXPIRE_MINUTES:-1440}
      
      # ‚îÄ‚îÄ‚îÄ CORS ‚îÄ‚îÄ‚îÄ
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      
      # ‚îÄ‚îÄ‚îÄ Azure App Service specific ‚îÄ‚îÄ‚îÄ
      - WEBSITES_PORT=8000
      - WEBSITES_ENABLE_APP_SERVICE_STORAGE=false
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

# ============================================================================
# VOLUMES
# ============================================================================
# In Azure App Service, mount Azure File Share to these paths:
#   - qdrant_data ‚Üí /app/qdrant_storage (REQUIRED for vector DB persistence)
#   - app_logs ‚Üí /app/logs (optional)
# ============================================================================
volumes:
  qdrant_data:
    driver: local
    name: ubis_qdrant_data
  app_logs:
    driver: local
    name: ubis_app_logs
