version: '3.8'

# ============================================================================
# DEVELOPMENT DOCKER COMPOSE
# ============================================================================
# For local development with SQLite and local file storage
# Usage: docker-compose up -d
# ============================================================================

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: ubis-backend-dev
    ports:
      - "8000:8000"
    volumes:
      # Persistent storage volumes
      - qdrant_data:/app/qdrant_storage
      - app_data:/app/data
      - app_logs:/app/logs
      # Mount local directories for development (optional, for easy access)
      # - ./backend/uploads:/app/uploads
      # - ./backend/reference_photos:/app/reference_photos
    # Dev server (overrides Dockerfile CMD; lighter than gunicorn locally)
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    environment:
      - ENVIRONMENT=development
      - PORT=8000
      - LOG_LEVEL=DEBUG
      # SQLite for local development
      - SQLITE_PATH=/app/data/ubis.db
      # Local Qdrant storage
      - QDRANT_URL=/app/qdrant_storage
      - QDRANT_COLLECTION=face_embeddings
      # JWT (use a simple secret for development)
      - JWT_SECRET=dev-secret-change-in-production
      - JWT_EXPIRE_MINUTES=1440
      # CORS (allow all for development)
      - CORS_ORIGINS=*
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

# Named volumes for persistent data
volumes:
  qdrant_data:
    driver: local
    name: ubis_dev_qdrant_data
  app_data:
    driver: local
    name: ubis_dev_app_data
  app_logs:
    driver: local
    name: ubis_dev_app_logs
